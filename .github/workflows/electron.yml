name: aria2-task-manager

on:
  push:
    paths:
      - "index.html"
      - "index.js"
      - "app.js"
      - "package.json"
      - "i18n/**"
      - "!common.css"
      - "!popup.css"
      - "!popup.js"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Detect asset changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            assets:
              - 'index.html'
              - 'index.js'

      - name: Fetch external JS/CSS
        if: steps.filter.outputs.assets == 'true'
        run: |
          curl -L -o aria2.js https://raw.githubusercontent.com/jc3213/aria2.js/refs/heads/main/src/aria2.js
          curl -L -o common.css https://raw.githubusercontent.com/jc3213/download_with_aria2/refs/heads/main/chromium/pages/common.css
          curl -L -o popup.css https://raw.githubusercontent.com/jc3213/download_with_aria2/refs/heads/main/chromium/pages/popup/popup.css
          curl -L -o popup.js https://raw.githubusercontent.com/jc3213/download_with_aria2/refs/heads/main/chromium/pages/popup/popup.js

      - name: Commit updated assets
        if: steps.filter.outputs.assets == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aria2.js common.css popup.css popup.js
          git diff --cached --quiet || git commit -m "Sync external assets"
          git push

      - name: Read version
        id: pkg
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Delete old release if exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release delete "$VERSION" -y || true
            git push origin ":refs/tags/$VERSION" || true
          fi

      - name: Create new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          gh release create "$VERSION" --title "$VERSION" --notes "Auto release $VERSION"

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    needs: prepare

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERSION: ${{ needs.prepare.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build Electron App
        run: npm run dist

      - name: Upload installers (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          find dist -type f \( -name "*.dmg" -o -name "*.AppImage" -o -name "*.exe" \) | while read file; do
            gh release upload "$VERSION" "$file" --clobber
          done

      - name: Upload installers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:VERSION

          $zip = "aria2-task-manager-$version-win64.zip"
          Compress-Archive "dist/win-unpacked/*" $zip -Force

          $setup = Get-ChildItem dist -Filter "*Setup*.exe" | Select-Object -First 1
          $exe = "aria2-task-manager-$version-win64.exe"
          Copy-Item $setup.FullName $exe -Force

          gh release upload $version $zip --clobber
          gh release upload $version $exe --clobber
